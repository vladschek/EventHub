name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep and validate templates
        run: |
          set -e
          curl -sSL https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64 -o bicep
          chmod +x bicep
          ./bicep build infrastructure/main.bicep

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build solution
        run: dotnet build backend/EventHub.sln -c Release

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build -- --configuration=development
